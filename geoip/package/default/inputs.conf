[geoipupdate_input]
python.version = python3
python.required = 3.13

# Disabled while we test whether the scripted input below runs on every search
# head cluster member, unlike this modular input which only runs on one
# (GitHub #76). To revert: set disabled = 0 here and disable/remove the
# [script://] stanza.
[geoipupdate_input://default]
interval = 3600
disabled = 1
# Run on every node so each downloads its own databases.
run_only_one = false

# Scripted-input variant. passAuth makes Splunk pass a session key on stdin.
# Testing whether this runs on every search head cluster member (GitHub #76).
# Use the absolute $SPLUNK_HOME/etc/apps/<app>/bin/ form: it is AppInspect's
# preferred pattern for scripted inputs, whereas the relative "./bin/" form
# triggers a Splunk Cloud warning. The app folder is always "geoip" for the
# published app.
[script://$SPLUNK_HOME/etc/apps/geoip/bin/geoipupdate_script.py]
interval = 3600
disabled = 0
# For Splunk Free, we apparently must use "admin", otherwise we get no session
# key when running the input. For Splunk Enterprise (and I think Splunk Cloud),
# we can use splunk-system-user.
passAuth = splunk-system-user
python.version = python3
python.required = 3.13
